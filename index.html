  <style>
    /* Skeleton Loading Crítico (Inline para evitar tela branca) */
    .skeleton-shell {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .skeleton-header {
      height: 60px;
      background: #eee;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .skeleton-hero {
      height: 300px;
      background: #f5f5f5;
      margin-bottom: 30px;
      border-radius: 12px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .skeleton-card {
      height: 200px;
      background: #eee;
      border-radius: 8px;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>
  
  <div id="app-root">
    <!-- App Shell / Loading State Inicial -->
    <div class="skeleton-shell" id="app-loading">
      <div class="skeleton-header"></div>
      <div class="skeleton-hero"></div>
      <div class="skeleton-grid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
      <p style="text-align:center; margin-top:20px; font-family: sans-serif; color: #666;">
        Carregando o melhor do Ceará...
      </p>
    </div>
  </div>

  <div id="modal-root" aria-live="polite"></div>
  <div id="toast-root" aria-live="polite" role="status"></div>

  <noscript>
    <div style="padding:2rem; max-width: 800px; margin: 0 auto; font-family: sans-serif; line-height: 1.6;">
      <h1>Turistando CE — Turismo no Ceará</h1>
      <p>O Turistando CE é uma plataforma interativa. Identificamos que seu JavaScript está desativado.</p>
      
      <h2>Principais Destinos no Ceará</h2>
      <ul>
        <li><a href="/cidade/jericoacoara">Jericoacoara</a> - Paraíso das dunas e lagoas.</li>
        <li><a href="/cidade/fortaleza">Fortaleza</a> - Capital vibrante com praias urbanas.</li>
        <li><a href="/cidade/canoa-quebrada">Canoa Quebrada</a> - Falésias coloridas e símbolo do sol e lua.</li>
        <li><a href="/cidade/guaramiranga">Guaramiranga</a> - A Suíça Cearense na serra.</li>
        <li><a href="/cidade/cumbuco">Cumbuco</a> - Capital mundial do Kitesurf.</li>
      </ul>
      
      <p>Para uma experiência completa com mapas, roteiros e fotos, por favor ative o JavaScript.</p>
    </div>
  </noscript>

  <script type="module" src="/app.bundle.js"></script>
</body>
</html>
